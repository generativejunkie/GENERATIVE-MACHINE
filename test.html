<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Mandala Machine</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: monospace;
            background: #f5f5f5;
        }
        #status {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .success { color: green; }
        .error { color: red; }
        #canvas-container {
            width: 100%;
            height: 400px;
            background: white;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="status">
        <h2>Mandala Machine - System Check</h2>
        <div id="results"></div>
    </div>
    <div id="canvas-container"></div>

    <script type="module">
        const results = document.getElementById('results');

        function log(message, isError = false) {
            const div = document.createElement('div');
            div.className = isError ? 'error' : 'success';
            div.textContent = (isError ? '❌ ' : '✅ ') + message;
            results.appendChild(div);
        }

        // Test 1: Three.js import
        try {
            const THREE = await import('three');
            log('Three.js imported successfully');

            // Test 2: Create scene
            const scene = new THREE.Scene();
            log('Scene created');

            // Test 3: Create camera
            const camera = new THREE.PerspectiveCamera(75, 16/9, 0.1, 1000);
            log('Camera created');

            // Test 4: Create renderer
            const renderer = new THREE.WebGLRenderer();
            renderer.setSize(800, 450);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            log('Renderer created and attached to DOM');

            // Test 5: Create a cube
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true });
            const cube = new THREE.Mesh(geometry, material);
            scene.add(cube);
            camera.position.z = 5;
            log('Cube created and added to scene');

            // Test 6: Animation
            function animate() {
                requestAnimationFrame(animate);
                cube.rotation.x += 0.01;
                cube.rotation.y += 0.01;
                renderer.render(scene, camera);
            }
            animate();
            log('Animation started - you should see a rotating cube below');

        } catch (error) {
            log('Error: ' + error.message, true);
            console.error(error);
        }

        // Test 7: Audio context
        try {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            log('AudioContext created successfully');
        } catch (error) {
            log('AudioContext error: ' + error.message, true);
        }
    </script>
</body>
</html>
